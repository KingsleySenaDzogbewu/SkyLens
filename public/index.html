<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyLens</title>
  <link rel="stylesheet" href="weather.css">
  <link rel="icon" type="image" href="weather-logo.png">
</head>

<body>
  <div id="intro">
  <video autoplay muted playsinline id="intro-video">
    <source src="intro-video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="intro-content">
    <img src="weather-logo.png" class="logo" />
    <h1>SkyLens</h1>
    <p>Your window to the sky</p>
  </div>
</div>

  <div id="main-content" style="display: none;">
    <div class="input-header">
      <input type="text" placeholder="Enter your city" class="input-city" aria-label="City name">
      <button class="search-icon-button" aria-label="Search city">
        <img src="search.svg" class="search-icon" alt="Search icon">
      </button>
    </div>

    <div class="status-message" role="status" aria-live="polite"></div>
    <div class="search-history" aria-label="Recent searches"></div>

    <div class="background hidden">
    <div class="country"></div>
    <div class="city-name"></div>
    <div class="description"></div>
    
    <div class="weather-flex">
      <img class="weather-icon">
      <div class="temp"></div> 
    </div>
    
    <div class="unit-toggle-container">
        <button id="convert-btn" class="glass-button">Switch to °F</button>
    </div>

    <div class="feels-Like"></div>

    <div class="weather-grid">
      <div class="weather-humidity"></div>
      <div class="wind-speed"></div>
      <div class="sunrise"></div>
      <div class="sunset"></div>
    </div>

    <div class="forecast-container">

    </div>

    <p class="last-update"></p>
  </div>
  </div> 
  
  <video autoplay muted loop playsinline id="bg-video">
    <source src="" type="video/mp4">
  </video>

  <script src="weather.js"></script>
</body>
</html>
